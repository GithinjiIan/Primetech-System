<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header { background: linear-gradient(135deg, #0f172a, #0ea5e9); padding: 30px; text-align: center; }
        .header h1 { color: #ffffff; margin: 0; font-size: 24px; }
        .header p { color: rgba(255,255,255,0.9); margin: 8px 0 0; }
        .body { padding: 30px; }
        .body h2 { color: #0f172a; }
        .credentials { background: #e0f2fe; border-left: 4px solid #0ea5e9; padding: 15px 20px; border-radius: 0 8px 8px 0; margin: 20px 0; }
        .credentials p { margin: 5px 0; }
        .credentials strong { color: #0f172a; }
        .btn { display: inline-block; background: #0ea5e9; color: #ffffff; text-decoration: none; padding: 12px 30px; border-radius: 8px; font-weight: 600; margin: 15px 0; }
        .warning { background: #e0f2fe; border: 1px solid #bae6fd; padding: 12px; border-radius: 8px; margin: 15px 0; font-size: 14px; color: #0f172a; }
        .footer { background: #f8fafc; padding: 20px; text-align: center; font-size: 12px; color: #64748b; }
        .status-approved { color: #0ea5e9; font-weight: bold; }
        .status-rejected { color: #dc3545; font-weight: bold; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{% block header_title %}PrimeTech LMS{% endblock %}</h1>
            {% block header_subtitle %}{% endblock %}
        </div>
        <div class="body">
            {% block body %}{% endblock %}
        </div>
        <div class="footer">
            {% block footer %}
            <p>© 2026 PrimeTech Foundation. All rights reserved.</p>
            {% endblock %}
        </div>
    </div>
</body>
</html>
