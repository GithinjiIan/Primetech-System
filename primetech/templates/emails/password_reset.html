<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header { background: linear-gradient(135deg, #1B4332, #2d5a45); padding: 30px; text-align: center; }
        .header h1 { color: #FFC107; margin: 0; font-size: 24px; }
        .body { padding: 30px; }
        .body h2 { color: #1B4332; }
        .btn { display: inline-block; background: #FFC107; color: #000; text-decoration: none; padding: 12px 30px; border-radius: 8px; font-weight: 600; margin: 15px 0; }
        .footer { background: #f8f9fa; padding: 20px; text-align: center; font-size: 12px; color: #6c757d; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Password Reset</h1>
        </div>
        <div class="body">
            <h2>Hello, {{ user.first_name }}!</h2>
            <p>We received a request to reset your password. Click the button below to set a new password:</p>
            <p style="text-align: center;">
                <a href="{{ reset_url }}" class="btn">Reset Password →</a>
            </p>
            <p style="font-size: 14px; color: #6c757d;">If you did not request this, please ignore this email. The link will expire shortly.</p>
        </div>
        <div class="footer">
            <p>© 2026 PrimeTech Foundation. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
