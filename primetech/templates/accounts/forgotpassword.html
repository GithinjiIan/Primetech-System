{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - PrimeTech Foundation</title>
    <link rel="icon" type="image/png" href="{% static 'img/logo new.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Merriweather & Open Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-dark: #020617;   
            --brand-navy: #0f172a;
            --brand-accent: #0ea5e9;
            --brand-light: #f8fafc;
            --border-radius: 16px;
        }
        body {
            font-family: 'Open Sans', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--brand-dark), var(--brand-navy));
            display: flex; align-items: center; justify-content: center;
            padding: 1rem; margin: 0;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Merriweather', serif;
            font-weight: 700;
        }
        .bg-blur { position: fixed; inset: 0; background: var(--brand-accent); opacity: 0.1; z-index: -1; }
        .overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.4); z-index: -1; }
        .form-card {
            background: #fff; border-radius: var(--border-radius);
            padding: 2.5rem; max-width: 450px; width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .btn-brand {
            background: linear-gradient(135deg, var(--brand-accent), var(--brand-navy));
            border: none; color: #fff; font-weight: 600;
            border-radius: 12px; padding: 0.7rem; transition: 0.3s;
        }
        .btn-brand:hover { background: var(--brand-dark); transform: translateY(-2px); box-shadow: 0 8px 25px rgba(14, 165, 233, 0.2); }
        .alert { border-radius: 12px; }
    </style>
</head>
<body>
    <div class="bg-blur"></div>
    <div class="overlay"></div>

    <div class="form-card text-center">
        <img src="{% static 'img/logo new.png' %}" alt="Logo" width="50" class="mb-3 rounded-3" />
        <h2 class="fw-bold mb-3" style="color: var(--brand-orange);">Forgot Password</h2>
        <p class="text-muted mb-4">Enter your email and we'll send you a reset link.</p>

        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
        {% endif %}

        <form method="post" action="{% url 'accounts:forgot_password' %}">
            {% csrf_token %}
            <div class="mb-4">
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    {{ form.email }}
                </div>
            </div>
            <button type="submit" class="btn btn-brand w-100 mb-3">Send Reset Link</button>
        </form>
        <a href="{% url 'accounts:login' %}" class="text-decoration-none small text-muted">
            <i class="fas fa-arrow-left me-1"></i> Back to Login
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
